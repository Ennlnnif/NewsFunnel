    # ────────────────────────────────────────
    twitter:
      # 通过 xreach CLI 采集（agent-reach skill 的 Twitter 通道）
      # 无需配置 Twitter 账号密码或 API Key，开箱即用
      # 安装: agent-reach install --env=auto
      search_queries:
        - query: "AI OR LLM OR GPT min_faves:200 lang:en since:{today}"
          type: "Top"
          count: 30
          note: "英文 AI 热门推文（仅限当日）"

        - query: "大模型 OR AI应用 OR 人工智能 lang:zh min_faves:50 since:{today}"
          type: "Top"
          count: 20
          note: "中文 AI 热门推文（仅限当日）"

        - query: "AI agent OR AI coding min_faves:100 lang:en since:{today}"
          type: "Top"
          count: 20
          note: "AI Agent 方向（仅限当日）"

