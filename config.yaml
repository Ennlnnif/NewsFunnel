    # ────────────────────────────────────────
    # 二、GitHub 信息渠道
    # ────────────────────────────────────────
    github:
      # ── 2.1 GitHub Trending（每日/每周热门仓库 RSS） ──
      trending:
        - name: "GitHub Trending - 全语言(每日)"
          url: "https://mshibanami.github.io/GitHubTrendingRSS/daily/all.xml"
          period: "daily"
          note: "每日全语言热门仓库，快速捕捉爆款项目"

        - name: "GitHub Trending - 全语言(每周)"
          url: "https://mshibanami.github.io/GitHubTrendingRSS/weekly/all.xml"
          period: "weekly"
          note: "每周维度过滤噪声，看持续热度"

      # ── 2.2 GitHub Search API（领域定向搜索近期新项目） ──
      # 每条 query 对应一个关注领域，搜索结果自动继承该领域的 relevance_tag
      # sort: stars/updated   order: desc/asc   created_after_days: 搜索近 N 天创建的项目
      # GITHUB_TOKEN 环境变量可选（未设置时 10 req/min，设置后 30 req/min）
      search:
        - query: "AI agent framework"
          tag: ai_agent
          sort: stars
          max_results: 10
          created_after_days: 90
          note: "AI Agent 框架/工具"

        - query: "LLM tool use function calling"
          tag: ai_agent
          sort: stars
          max_results: 5
          created_after_days: 90
          note: "LLM 工具调用/Agent 能力"

        - query: "AI coding assistant IDE"
          tag: ai_agent
          sort: stars
          max_results: 5
          created_after_days: 90
          note: "AI 编程工具"

        - query: "text to video generation AI"
          tag: ai_video
          sort: stars
          max_results: 5
          created_after_days: 90
          note: "AI 视频生成"

        - query: "AI game NPC procedural generation"
          tag: ai_gaming
          sort: stars
          max_results: 5
          created_after_days: 90
          note: "AI 游戏/智能 NPC"

        - query: "AI companion chatbot character roleplay"
          tag: ai_social
          sort: stars
          max_results: 5
          created_after_days: 90
          note: "AI 社交/伴侣"

        - query: "large language model inference optimization"
          tag: ai_core
          sort: stars
          max_results: 5
          created_after_days: 90
          note: "大模型推理优化"

