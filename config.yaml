      - "Simon Willison"
      - "a16z Blog"

  # ══════════════════════════════════════════
  # 第一道漏斗：相关性标签（关键词匹配）
  # ══════════════════════════════════════════

  # ══════════════════════════════════════════
  # 渠道通行证：这些渠道的文章跳过关键词筛选，直接进入评分排序
  # 注意：GitHub 已移除通行证，扩大采集范围后需要做相关性验证
  # ══════════════════════════════════════════
  always_pass_channels:
    # - github   # 已移除：Search API 扩展后需要关键词/LLM 验证相关性
    - manual     # 手工输入已是人工判断
    - wechat     # 微信公众号是人工精选的29个号，信噪比高；标题"吸睛体"+摘要极短导致signals命中率极低，交给LLM分类

  # ══════════════════════════════════════════
  # 关键词体系：signals（信号词）+ brands（品牌词，仅供 LLM 参考）
  #
  # 设计原则（2026-04-14 重构）：
  #   signals — 参与关键词硬筛，判断"跟 AI 有没有关系"
  #   brands  — 不参与硬筛（噪音大），仅保留在 config 中供 LLM 分类时参考
  #   板块归属由 LLM 智能分类决定（primary_tag），不由关键词标签决定
  # ══════════════════════════════════════════

  relevance_tags:
    # ─── 🔴 核心领域（priority: core） ───
    ai_core:
