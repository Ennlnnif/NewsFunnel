# ══════════════════════════════════════════
# Layer 2: 筛选配置（filter）
# ══════════════════════════════════════════

filter:
  # ── 去重参数 ──
  dedup_window_hours: 72              # 去重时间窗口（加载前 N 小时的历史数据）
  title_similarity_threshold: 0.85    # 标题模糊去重阈值（difflib.SequenceMatcher）

  # ── 三管道独立配额（main / github / twitter 各自按标签取 top-N，管道间不竞争） ──
  # 设计思路：三个管道的内容性质差异大，混在一起竞争会导致 GitHub/Twitter 被高分新闻挤掉
  # 数量配比：主日报 > GitHub > Twitter
  # 管道→渠道映射：main(rss/wechat/exa/manual), github(github), twitter(twitter)
  pipeline_quotas:
    main:                               # 📰 主日报管道（rss/wechat/exa/manual）
      ai_core: 5
      ai_agent: 10
      ai_video: 5
      ai_gaming: 5
      ai_social: 5
      ai_product: 3
      ai_business: 3
    github_trending:                    # 🐙 GitHub 热门趋势（Trending Daily + Weekly）
      ai_core: 1
      ai_agent: 2
      ai_video: 1
      ai_gaming: 1
      ai_social: 1
      ai_product: 1
      ai_business: 1
    github_new:                         # 🆕 GitHub 新品发现（Search API + Blog）
      ai_core: 1
      ai_agent: 2
      ai_video: 1
      ai_gaming: 1
      ai_social: 1
      ai_product: 1
      ai_business: 1
    twitter:                            # 🐦 Twitter 管道
      ai_core: 2
      ai_agent: 2
      ai_video: 1
      ai_gaming: 1
      ai_social: 1
      ai_product: 1
      ai_business: 1

  # ── 后备配额（pipeline_quotas 未配置的管道退化为此值） ──
  quota_per_tag:
    ai_core: 5
    ai_agent: 10
    ai_video: 5
    ai_gaming: 5
    ai_social: 5
    ai_product: 3
    ai_business: 3
  default_quota: 5                    # 未配置标签的默认配额
  min_articles_warning: 3             # 某领域文章数低于此值时标记"低供给"

  # ── LLM 轻筛配置（方案 C：关键词主力 + LLM 去噪/捞漏） ──
  llm_light_filter:
    enabled: true                     # 开关，false 时完全退化为纯关键词筛选
    # 使用系统默认主模型，不额外指定 model
    batch_size_denoise: 30            # Step 3b 去噪：每批发送的文章数
    batch_size_rescue: 50             # Step 3c 捞漏：每批发送的标题数
    # 当前适用管道
    pipelines:
      - main                          # 主日报管道（RSS/微信/Exa）
      # - github                      # 未来扩展：GitHub 收集范围调整后启用

  # ── 观点板块分流配置（2026-04-14 新增） ──
  # opinion 文章从 main/twitter 管道分流到独立板块
  # 排序：VIP 优先 > 综合评分（含时效性+覆盖广度）
  opinion_section:
    max_items: 3                        # 固定输出 3 篇观点文章

  # ── 内容类型分类配置（技术/产品优先，观点类分流到独立板块） ──
  # 仅影响主日报管道（rss/wechat/exa）的评分
  # 在标签配额竞争中，技术/产品类文章因加分而更容易胜出
  content_type:
    tech_product_bonus: 0.5           # 技术/产品发布类文章加分
    opinion_penalty: -1.0             # 普通观点/评论类文章扣分
    # VIP 作者/源的观点文章不扣分（加 0.0）
    # 业界大牛的深度观点仍有价值，不应被降权
    vip_authors:
      # AI 领域核心人物
      - "Sam Altman"
      - "Jensen Huang"
      - "黄仁勋"
      - "Satya Nadella"
      - "Mark Zuckerberg"
      - "Demis Hassabis"
      - "Dario Amodei"
      - "Andrej Karpathy"
      - "karpathy"
      - "Yann LeCun"
      - "ylecun"
      - "Jim Fan"
      - "Ilya Sutskever"
      - "Geoffrey Hinton"
      - "Andrew Ng"
      - "吴恩达"
      - "李彦宏"
      # 行业分析大牛
      - "Matthew Ball"
      - "matthewball"
      - "Ben Thompson"
      - "stratechery"
      - "Benedict Evans"
      # 顶级技术博客作者
      - "Simon Willison"
      - "Paul Graham"
      - "Lilian Weng"
    vip_sources:
      - "OpenAI Blog"
      - "Anthropic"
