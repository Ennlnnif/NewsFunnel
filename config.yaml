      - "VentureBeat"
      - "a16z Blog"
      - "GameLook"
      # 微信 AI 媒体（通过前缀匹配自动识别 "微信: 量子位"）
      - "AIGC Studio"
      - "AI新榜"
      - "数字生命卡兹克"
      - "LitGate"
      - "Founder Park"
      - "极客公园"
      - "游戏葡萄"
      - "游戏研究社"
    # 未列出的源默认归入 aggregate（快衰减）

  # ── 渠道默认权重 ──
  channel_weights:
    rss: 2         # RSS 正式源有结构化数据，质量较稳定
    github: 2      # GitHub Trending 代表社区热度
    wechat: 1      # 微信公众号（不高于其他主日报源，靠LLM分类+评分公平竞争）
    exa: 1         # Exa 搜索结果质量不如直接订阅
    twitter: 1     # Twitter 噪声较多，但有时效性优势
    manual: 3      # 手工输入默认最高权重（人工判断过的）

  # ── 互动数据阈值 ──
  engagement_thresholds:
    twitter:
      # 综合热度 = likes×1.0 + retweets×3.0 + views×0.01（聚焦 trending）
      heat_high: 800    # 综合热度 ≥ 800 → 2 分（大规模传播的热门推文）
      heat_medium: 250   # 综合热度 ≥ 250 → 1.5 分
      heat_low: 80       # 综合热度 ≥ 80 → 1 分
    github:
      high: 100    # stars ≥ 100 → 2 分
      medium: 30   # stars ≥ 30 → 1 分（≥10 → 0.5，<10 → 0）

  # ── Twitter 质量控制 ──
  # 推文先过关键词相关性，再过热度硬门槛，最后按热度排序竞争配额
  twitter_quality:
    min_heat: 50                        # 综合热度最低门槛（低于此值直接淘汰）
    # 公式：likes×1.0 + retweets×3.0 + views×0.01（聚焦 trending，不捞冷门）
    # 参考：likes=7 views=489 → heat≈11.9（不过门槛）
    #       likes=140 retweets=42 views=24760 → heat≈513.6（轻松过门槛）

  # ── GitHub 质量控制（两子管道独立门槛，2026-04-16 拆分） ──
  # trending: 高 stars 门槛，过滤低质量刷榜项目
  # new: 低 stars 门槛，保护 stars 尚在积累的早期好项目
  github_trending_quality:
    min_stars: 100                      # 热门趋势：≥100 stars 才入选

  github_new_quality:
    min_stars: 30                       # 新品发现：≥30 stars 才入选（早期项目友好）

  # ── 冷门保护 ──
  cold_protection:
    enabled: true
    threshold_override: 2        # 受保护文章的通过阈值（正常核心是 4）
    max_protected_per_day: 3     # 每天最多保护 3 篇，防止噪声
    protected_sources:
      - "Simon Willison"
      - "Lilian Weng"
      - "Jay Alammar"
    protected_tags:              # 这些标签的文章更值得保护
      - "ai_core"
      - "ai_gaming"
      - "ai_agent"

  # ── URL 归一化：要去除的 tracking 参数 ──
  url_strip_params:
    - "utm_source"
    - "utm_medium"
    - "utm_campaign"
    - "utm_content"
    - "utm_term"
    - "ref"
    - "source"
    - "from"
    - "spm"
    - "share_from"
    - "share_source"
    - "f"

# ══════════════════════════════════════════
# Layer 3: 编辑配置（editor）
# ══════════════════════════════════════════

editor:
  # LLM 工作由 CodeBuddy 在对话中完成，不依赖外部 API
  # Prompt 模板参见 layers/editor.py 中的 SECTION_PROMPT / TWITTER_PROMPT / GITHUB_PROMPT
  summary_max_length: 50

  # ── 主日报板块（按 relevance_tag 映射，固定顺序展示） ──
  # 顺序决定双标签文章的归属优先级：
  #   垂直领域优先于通用（ai_core 排后）
  #   行业动态优先于产品（收购/IPO 类归 ai_business 而非 ai_product）
  # 仅处理 main 管道文章，GitHub/Twitter/Opinion 有独立小节
  sections:
    - tag: ai_agent
      title: "AI Agent"
    - tag: ai_video
      title: "AI视频"
    - tag: ai_gaming
      title: "AI游戏"
    - tag: ai_social
      title: "AI社交"
    - tag: ai_core
      title: "AI通用技术/模型"
    - tag: ai_business
      title: "AI行业动态"
    - tag: ai_product
      title: "其他值得关注的产品"

  # ── Twitter / GitHub / Opinion 独立小节 ──
  # 不按标签分组，按各自规则排序展示
  twitter_section:
    title: "Twitter 热门"
    max_items: 10                     # 最多展示条数
  github_trending_section:
    title: "GitHub 热门趋势"
    max_items: 10
  github_new_section:
    title: "GitHub 新品发现"
    max_items: 10
  opinion_section:
    title: "行业观点"
    max_items: 3                      # 固定 3 篇精选观点

# ══════════════════════════════════════════
# Layer 4: 归档配置（archiver）
# ══════════════════════════════════════════

archiver:
  raw_retention_days: 30
  knowledge_extraction: true
