# ============================================================
# AI Daily News — 信息源配置
# 最后更新: 2026-04-13
# 
# ⚠️ 此文件将迁移至 config.yaml 的 collector.sources 节。
#    当前保留为独立文件，待 config.yaml 就绪后合入。
#    参考新架构设计：docs/architecture.md
# ============================================================

# ── 全局配置（将迁移到 config.yaml → collector 节） ──
global:
  # 采集调度
  fetch_interval_minutes: 30        # 默认采集间隔（分钟）
  request_timeout_seconds: 15       # 单次请求超时
  max_retries: 2                    # 请求失败重试次数
  retry_delay_seconds: 5            # 重试间隔
  # 去重
  dedup_window_hours: 72            # 去重时间窗口（小时）
  dedup_strategy: "url+title"       # 去重策略：url精确 + 标题相似度
  title_similarity_threshold: 0.85  # 标题相似度阈值（0-1）
  # 存储
  data_dir: "./data"                # 数据存储目录
  db_file: "./data/articles.db"     # SQLite 数据库路径
  # 日志
  log_level: "INFO"

